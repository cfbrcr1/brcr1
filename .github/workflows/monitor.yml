
name: test

on:
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install puppeteer

      - name: Run
        env:
          CORE_JS: ${{ CORE_JS }}
          WORKER_URL: ${{ WORKER_URL }}
        run: |
          echo "$CORE_JS" > index.js
          node index.js
