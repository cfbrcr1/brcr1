name: CI

on:
  #schedule:
  #  # 每10分钟执行一次（UTC时间，基于UTC+8的cron在此换算）
  #  - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 缓存依赖、浏览器和中文字体
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/puppeteer
            /usr/share/fonts/noto-cjk
          key: ${{ runner.os }}-puppeteer-v3-${{ hashFiles('package.json') }}
          restore-keys: ${{ runner.os }}-puppeteer-v3-

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装中文字体
        run: |
          # 检查字体是否已缓存，避免重复安装
          if [ ! -d "/usr/share/fonts/noto-cjk" ]; then
            sudo apt-get install -y --no-install-recommends fonts-noto-cjk
            sudo mkdir -p /usr/share/fonts/noto-cjk
            sudo cp /usr/share/fonts/opentype/noto/*.otf /usr/share/fonts/noto-cjk/ 2>/dev/null || true
            sudo cp /usr/share/fonts/truetype/noto/*.ttf /usr/share/fonts/noto-cjk/ 2>/dev/null || true
            sudo fc-cache -fv
          else
            echo "中文字体已从缓存恢复，跳过安装"
            sudo cp /usr/share/fonts/noto-cjk/*.otf /usr/share/fonts/opentype/noto/ 2>/dev/null || true
            sudo cp /usr/share/fonts/noto-cjk/*.ttf /usr/share/fonts/truetype/noto/ 2>/dev/null || true
            sudo fc-cache -f
          fi

      - name: 安装依赖并运行
        env:
          CF_API_URL: ${{ secrets.CF_API_URL }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          # NODE_NAME 必须唯一，用于分片计算
          NODE_NAME: ${{ secrets.NODE_NAME }}
          # 严禁用 echo "$MAIN" > file，shell会解析 ${} 导致代码损坏
          MAIN: ${{ secrets.MAIN }}
        run: |
          npm install puppeteer-core puppeteer-extra puppeteer-extra-plugin-adblocker croner
          printenv MAIN > main_deploy.js
          node main_deploy.js
