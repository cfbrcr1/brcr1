name: CI

on:
  #schedule:
  #  # 每10分钟执行一次（UTC时间，基于UTC+8的cron在此换算）
  #  - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 缓存依赖和浏览器
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-v4-${{ hashFiles('package.json') }}
          restore-keys: ${{ runner.os }}-puppeteer-v4-

      - name: 缓存JS请求网络资源
        uses: actions/cache@v4
        with:
          path: resource_cache
          key: ${{ runner.os }}-resource-cache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-resource-cache-

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装中文字体
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk fonts-wqy-zenhei fonts-wqy-microhei
          sudo fc-cache -fv

      - name: 安装依赖并运行
        env:
          CF_API_URL: ${{ secrets.CF_API_URL }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          # NODE_NAME 必须唯一，用于分片计算
          NODE_NAME: ${{ secrets.NODE_NAME }}
          # 严禁用 echo "$MAIN" > file，shell会解析 ${} 导致代码损坏
          MAIN: ${{ secrets.MAIN }}
        run: |
          npm install puppeteer-core puppeteer-extra puppeteer-extra-plugin-adblocker croner
          printenv MAIN > main.js
          node main.js
